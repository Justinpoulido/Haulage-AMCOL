<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Headquarters Map</title>

    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
        }

        /* Map Section */

        .map-section {
            position: relative;
            height: 90vh;
            width: 100%;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* Floating Info Card */

        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            background: #13273f;
            border-radius: 16px;
            padding: 28px;
            color: white;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .info-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #e53935;
            border-radius: 16px 16px 0 0;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .coords {
            color: #a8b2c0;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .info-row {
            margin-bottom: 12px;
            font-size: 14px;
            color: #d1d5db;
        }

        /* Notice Box */

        .notice {
            background: #1c3552;
            border-radius: 10px;
            padding: 14px;
            margin: 18px 0;
            font-size: 13px;
        }

        .notice strong {
            display: block;
            margin-bottom: 6px;
        }

        /* Button */

        .direction-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2e6ae6;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .direction-btn:hover {
            background: #3b82f6;
        }
    </style>
</head>

<body>

    <div class="map-section">

        <div id="map"></div>

        <div class="info-card">

            <div class="card-title">Headquarters & Main Yard</div>
            <div class="coords">10.6524° N, 61.5123° W</div>

            <div class="info-row">
                Americas Marketing Company Limited, Trinidad and Tobago
            </div>

            <div class="info-row">
                +1 (868) 123-4567
            </div>

            <div class="info-row">
                Mon–Fri: 8am – 5pm, Sat: 9am – 1pm
            </div>

            <div class="notice">
                <strong>HEAVY VEHICLE ENTRANCE</strong>
                All heavy transport and oversized loads must enter via the Western Gate to avoid administrative parking
                congestion.
            </div>

            <button class="direction-btn"
                onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=10.6524,-61.5123')">
                Get Driving Directions
            </button>

        </div>

    </div>

    <script src="amcol-config.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <script>

        const mapElement = document.getElementById('map');
        const mapboxToken = window.AMCOL_CONFIG?.mapboxToken || window.AMCOL_MAPBOX_TOKEN || '';

        if (mapElement && typeof mapboxgl !== 'undefined' && mapboxToken) {
            mapboxgl.accessToken = mapboxToken;

            const map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/dark-v11',
                center: [-61.5123, 10.6524],
                zoom: 8
            });

            new mapboxgl.Marker({ color: "#e53935" })
                .setLngLat([-61.5123, 10.6524])
                .addTo(map);
        } else if (mapElement && !mapboxToken) {
            mapElement.textContent = 'Map preview unavailable.';
        }

    </script>

</body>

</html>
