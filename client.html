<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AMCOL Client Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style type="text/tailwindcss">
        :root {
            --primary-red: #cc1f31;
            --primary-blue: #1e40af;
            --accent-cyan: #39d9cd;
            --ink: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1220;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        .portal-shell {
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(248, 250, 252, 0.96) 0%, rgba(248, 250, 252, 0.92) 60%, rgba(15, 23, 42, 0.62) 60%),
                linear-gradient(130deg, rgba(204, 31, 49, 0.12) 0%, rgba(57, 217, 205, 0.08) 100%),
                url('./assets/Nighttime truck with office building.png') center / cover no-repeat;
        }

        .portal-shell::before,
        .portal-shell::after {
            content: "";
            position: absolute;
            border-radius: 9999px;
            filter: blur(10px);
            pointer-events: none;
        }

        .portal-shell::before {
            width: 360px;
            height: 360px;
            left: -120px;
            top: 28%;
            background: radial-gradient(circle, rgba(57, 217, 205, 0.22), rgba(57, 217, 205, 0));
            animation: floaty 8s ease-in-out infinite;
        }

        .portal-shell::after {
            width: 280px;
            height: 280px;
            right: 6%;
            bottom: 8%;
            background: radial-gradient(circle, rgba(204, 31, 49, 0.22), rgba(204, 31, 49, 0));
            animation: floaty 9s ease-in-out infinite reverse;
        }

        @keyframes floaty {
            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-18px);
            }
        }

        .glass-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.58));
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 22px 52px rgba(15, 23, 42, 0.2);
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.48);
            border: 1px solid rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .input-shell {
            @apply relative rounded-2xl border border-slate-300/70 bg-white/45;
        }

        .input-shell:focus-within {
            @apply border-slate-400 bg-white/70;
            box-shadow: 0 0 0 2px rgba(57, 217, 205, 0.18);
        }

        .pulse-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @media (max-width: 900px) {
            .portal-shell {
                background:
                    linear-gradient(180deg, rgba(248, 250, 252, 0.95) 0%, rgba(248, 250, 252, 0.84) 44%, rgba(15, 23, 42, 0.56) 100%),
                    linear-gradient(130deg, rgba(204, 31, 49, 0.12) 0%, rgba(57, 217, 205, 0.08) 100%),
                    url('./assets/Nighttime truck with office building.png') center / cover no-repeat;
            }
        }
    </style>
</head>

<body class="antialiased text-slate-900">
    <main class="portal-shell">
        <header class="relative z-20 px-4 sm:px-8 lg:px-14 pt-6 sm:pt-8">
            <div class="mx-auto max-w-7xl flex items-center justify-between gap-4">
                <a href="index.html" class="flex items-center gap-3 sm:gap-4">
                    <div class="h-12 w-12 sm:h-14 sm:w-14 rounded-xl bg-[#cc1f31] text-white flex items-center justify-center shadow-lg shadow-red-900/25">
                        <span class="material-symbols-outlined text-[26px]">local_shipping</span>
                    </div>
                    <p class="text-lg sm:text-3xl font-black tracking-tight text-slate-900">
                        <span>AMCOL </span><span class="text-[#cc1f31]">HAULAGE</span>
                    </p>
                </a>
                <nav class="nav-glass hidden md:flex items-center rounded-full px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm">
                    <a class="px-4 py-2 transition-colors hover:text-[#cc1f31]" href="index.html#top">Home</a>
                    <a class="px-4 py-2 transition-colors hover:text-[#cc1f31]" href="index.html#services">Services</a>
                    <a class="px-4 py-2 transition-colors hover:text-[#cc1f31]" href="index.html#contact">Support</a>
                    <a class="ml-2 inline-flex items-center rounded-full bg-[#cc1f31] px-6 py-2.5 font-bold text-white shadow-lg shadow-red-900/20 transition-transform hover:-translate-y-0.5" href="#">Register</a>
                </nav>
            </div>
        </header>

        <section class="relative z-10 px-4 pb-10 pt-10 sm:pt-14">
            <div class="mx-auto max-w-7xl flex justify-center">
                <div class="glass-card w-full max-w-xl rounded-[2rem] px-6 sm:px-10 py-9 sm:py-11">
                    <div class="text-center">
                        <h1 class="text-4xl sm:text-5xl font-black tracking-tight text-slate-900">Client Portal</h1>
                        <p class="mt-4 text-lg leading-relaxed text-slate-700">Access your haulage dashboard and real-time tracking.</p>
                    </div>

                    <form id="loginForm" class="mt-10 space-y-6" autocomplete="on">
                        <div>
                            <label class="mb-2.5 block text-lg font-bold text-slate-800" for="clientId">Client ID</label>
                            <div class="input-shell">
                                <span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
                                <input id="clientId" name="clientId" type="text" placeholder="TH-000000" class="w-full rounded-2xl border-0 bg-transparent py-4 pl-14 pr-4 text-lg font-medium text-slate-700 placeholder:text-slate-400 focus:ring-0" required />
                            </div>
                        </div>

                        <div>
                            <label class="mb-2.5 block text-lg font-bold text-slate-800" for="password">Password</label>
                            <div class="input-shell">
                                <span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                                <input id="password" name="password" type="password" placeholder="........" class="w-full rounded-2xl border-0 bg-transparent py-4 pl-14 pr-14 text-lg font-medium text-slate-700 placeholder:text-slate-400 focus:ring-0" required minlength="6" />
                                <button id="togglePassword" type="button" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-lg p-2 text-slate-500 transition-colors hover:bg-white/70 hover:text-slate-700" aria-label="Show password">
                                    <span class="material-symbols-outlined">visibility</span>
                                </button>
                            </div>
                        </div>

                        <div class="flex flex-wrap items-center justify-between gap-3 text-lg">
                            <label class="inline-flex cursor-pointer select-none items-center gap-2.5 text-slate-700">
                                <input id="rememberMe" type="checkbox" class="h-5 w-5 rounded border-slate-300 text-[#cc1f31] focus:ring-[#cc1f31]/30" />
                                Remember me
                            </label>
                            <a href="#" class="font-semibold text-[#cc1f31] transition-colors hover:text-red-700">Forgot password?</a>
                        </div>

                        <button type="submit" class="group inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-[#cc1f31] px-6 py-4 text-2xl font-black text-white shadow-xl shadow-red-900/20 transition-all hover:-translate-y-0.5 hover:bg-red-700">
                            <span>Sign In</span>
                            <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
                        </button>
                    </form>

                    <div class="mt-8 border-t border-slate-300/80 pt-5 text-center">
                        <div class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-[0.24em] text-slate-500">
                            <span class="pulse-dot h-2 w-2 rounded-full bg-[#39d9cd]"></span>
                            <span>Secure Client Access</span>
                        </div>
                        <p class="mt-8 text-xl text-slate-700">Need assistance? <a class="font-bold text-[#cc1f31] hover:text-red-700" href="index.html#contact">Contact Support</a></p>
                    </div>
                </div>
            </div>
        </section>

        <footer class="relative z-10 pb-8 text-center">
            <p class="text-sm text-slate-500">&copy; <span id="year"></span> AMCOL Haulage &amp; Logistics. All rights reserved.</p>
            <p class="mt-1 text-xs text-slate-500/90">Portal time: <span id="liveTime">--:--:--</span></p>
        </footer>
    </main>

    <script>
        const clientIdInput = document.getElementById('clientId');
        const passwordInput = document.getElementById('password');
        const rememberMeInput = document.getElementById('rememberMe');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const yearEl = document.getElementById('year');
        const liveTimeEl = document.getElementById('liveTime');
        const loginForm = document.getElementById('loginForm');

        yearEl.textContent = new Date().getFullYear();

        const rememberedClientId = localStorage.getItem('amcol_client_id');
        if (rememberedClientId) {
            clientIdInput.value = rememberedClientId;
            rememberMeInput.checked = true;
        }

        const updateClock = () => {
            const now = new Date();
            liveTimeEl.textContent = now.toLocaleTimeString('en-TT', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        };
        updateClock();
        setInterval(updateClock, 1000);

        togglePasswordBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            togglePasswordBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            togglePasswordBtn.querySelector('.material-symbols-outlined').textContent = isHidden ? 'visibility_off' : 'visibility';
        });

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();

            if (rememberMeInput.checked) {
                localStorage.setItem('amcol_client_id', clientIdInput.value.trim());
            } else {
                localStorage.removeItem('amcol_client_id');
            }

            const button = loginForm.querySelector('button[type="submit"]');
            const oldText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = '<span>Authenticating...</span><span class="material-symbols-outlined animate-spin">progress_activity</span>';

            setTimeout(() => {
                button.disabled = false;
                button.innerHTML = oldText;
            }, 1300);
        });
    </script>
</body>

</html>
